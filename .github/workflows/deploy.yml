name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only contents:write is needed — we build the app and publish the output to
# the gh-pages branch, then let GitHub's built-in "Deploy from a branch" Pages
# source serve that branch.
#
# We deliberately do NOT use actions/deploy-pages here. Mixing a custom
# deploy-pages workflow with a branch-based Pages source makes TWO deployers
# race for the same github-pages environment: this workflow, and GitHub's
# built-in "pages build and deployment" job. Whichever finishes last wins, so
# the live site would intermittently serve the raw, unbuilt index.html (the
# one referencing /src/main.jsx) instead of the build. Publishing to a single
# branch and serving that branch removes the race entirely.
# See staging/stage-5-deploy-polish/feature-github-actions-deploy.md.
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish build to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
